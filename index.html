<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Кохання для Ірки</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffb6c1, #ffe4e1);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe Script', cursive;
      text-align: center;
      cursor: pointer;
      overflow: hidden;
    }
    #message {
      font-size: 2em;
      display: none;
      color: #d6006e;
      z-index: 10;
    }
    #tap {
      font-size: 2em;
      color: #fff;
      background: rgba(0,0,0,0.2);
      padding: 20px;
      border-radius: 10px;
      z-index: 10;
    }
    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      transform: rotate(45deg);
      animation: floatUp 6s linear forwards;
    }
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }
    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(45deg); opacity: 1; }
      100% { transform: translateY(-800px) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body onclick="showMessage()">
  <div id="tap">Торкнись</div>
  <div id="message">Ірка, моя кохана, я тебе люблю ❤️</div>

  <!-- Музика -->
  <audio id="music" src="love_music.mp3" preload="auto" loop></audio>

  <script>
    let heartInterval;
    function showMessage() {
      document.getElementById('tap').style.display = 'none';
      document.getElementById('message').style.display = 'block';

      // Запуск музики після дотику (Safari дозволяє тільки так)
      const music = document.getElementById('music');
      music.play().catch(err => console.log("Safari блокує автозапуск:", err));

      // нескінченні сердечка
      if (!heartInterval) {
        heartInterval = setInterval(createHeart, 400);
      }
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';

      // випадковий колір
      const colors = ['red', 'hotpink', 'deeppink', 'violet', 'purple'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      heart.style.background = color;
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.top = window.innerHeight + 'px';

      // псевдоелементи теж кольорові
      heart.style.setProperty('--before-color', color);
      heart.style.setProperty('--after-color', color);

      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }
  </script>
</body>
</html>
